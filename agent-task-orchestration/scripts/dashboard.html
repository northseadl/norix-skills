<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编排器 · Dashboard</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%2309090b'/><rect x='3' y='4' width='2' height='8' rx='1' fill='%234ade80'/><rect x='7' y='6' width='2' height='6' rx='1' fill='%23e5a63e'/><rect x='11' y='3' width='2' height='9' rx='1' fill='%2360a5fa'/></svg>">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #09090b;
            --bg1: #0f0f12;
            --bg2: #161619;
            --bg3: #1c1c20;
            --card: #111114;
            --card-h: #17171b;
            --border: rgba(255, 255, 255, 0.06);
            --border-s: rgba(255, 255, 255, 0.03);
            --text: #e8e6e3;
            --t2: #9a9590;
            --t3: #6a6560;
            --t4: #3a3835;
            --amber: #e5a63e;
            --amber-bg: rgba(229, 166, 62, 0.08);
            --amber-bd: rgba(229, 166, 62, 0.25);
            --green: #4ade80;
            --green-bg: rgba(74, 222, 128, 0.06);
            --green-bd: rgba(74, 222, 128, 0.2);
            --red: #f87171;
            --red-bg: rgba(248, 113, 113, 0.06);
            --red-bd: rgba(248, 113, 113, 0.2);
            --blue: #60a5fa;
            --blue-bg: rgba(96, 165, 250, 0.06);
            --stone: #57534e;
            --r: 8px;
            --r-sm: 4px;
        }

        html {
            font-size: 13px
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5
        }

        code,
        .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em
        }

        .shell {
            max-width: 1120px;
            margin: 0 auto;
            padding: 32px 24px 80px
        }

        /* ─── Header ─── */
        .hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            padding-bottom: 20px;
        }

        .hdr-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .hdr-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.02em
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .badge i {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .badge--running {
            background: var(--amber-bg);
            color: var(--amber);
            border: 1px solid var(--amber-bd);
        }

        .badge--running i {
            background: var(--amber);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .badge--completed {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid var(--green-bd);
        }

        .badge--completed i {
            background: var(--green);
        }

        .badge--failed {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red-bd);
        }

        .badge--failed i {
            background: var(--red);
        }

        .badge--initializing {
            background: var(--bg2);
            color: var(--t3);
            border: 1px solid var(--border);
        }

        .badge--initializing i {
            background: var(--t3);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.4
            }
        }

        .hdr-right {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 11px;
            color: var(--t3);
        }

        .hdr-right b {
            color: var(--t2);
            font-weight: 500;
        }

        /* ─── Stats Row ─── */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border-s);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .stat {
            background: var(--card);
            padding: 14px 16px;
        }

        .stat-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--t3);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-val {
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .stat-sub {
            font-size: 10px;
            color: var(--t3);
            margin-top: 2px;
            font-variant-numeric: tabular-nums;
        }

        /* ─── Progress Bar ─── */
        .prog {
            height: 3px;
            background: var(--bg2);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .prog-fill {
            height: 100%;
            transition: width 0.8s cubic-bezier(.25, .46, .45, .94), background 0.3s;
            border-radius: 2px;
        }

        .prog-fill--running {
            background: linear-gradient(90deg, var(--amber), #f4c15f);
        }

        .prog-fill--completed {
            background: linear-gradient(90deg, var(--green), #86efac);
        }

        .prog-fill--failed {
            background: linear-gradient(90deg, var(--red), #fca5a5);
        }

        /* ─── Section ─── */
        .sec {
            margin-bottom: 24px;
        }

        .sec-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .sec-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--t3);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* ─── Timeline (Gantt) ─── */
        .timeline {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 16px;
            overflow-x: auto;
        }

        .tl-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }

        .tl-label {
            width: 48px;
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 600;
            text-align: right;
            color: var(--t2);
        }

        .tl-track {
            flex: 1;
            height: 24px;
            position: relative;
            background: var(--bg1);
            border-radius: var(--r-sm);
            overflow: hidden;
        }

        .tl-bar {
            position: absolute;
            top: 2px;
            bottom: 2px;
            border-radius: 3px;
            min-width: 4px;
            transition: width 0.6s ease, left 0.3s ease, background 0.3s;
            display: flex;
            align-items: center;
            padding: 0 6px;
            font-size: 9px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            overflow: hidden;
            white-space: nowrap;
        }

        .tl-bar--pending {
            background: var(--bg3);
            color: var(--t4);
        }

        .tl-bar--running {
            background: linear-gradient(90deg, rgba(229, 166, 62, 0.35), rgba(229, 166, 62, 0.15));
            border: 1px solid var(--amber-bd);
        }

        .tl-bar--success {
            background: linear-gradient(90deg, rgba(74, 222, 128, 0.2), rgba(74, 222, 128, 0.08));
            border: 1px solid var(--green-bd);
        }

        .tl-bar--failed {
            background: linear-gradient(90deg, rgba(248, 113, 113, 0.2), rgba(248, 113, 113, 0.08));
            border: 1px solid var(--red-bd);
        }

        .tl-bar--skipped {
            background: var(--bg3);
            opacity: 0.4;
        }

        .tl-time {
            width: 52px;
            flex-shrink: 0;
            font-size: 10px;
            color: var(--t3);
            font-variant-numeric: tabular-nums;
            text-align: right;
        }

        .tl-scale {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0 0;
            border-top: 1px solid var(--border-s);
            margin-top: 8px;
        }

        .tl-scale-spacer {
            width: 48px;
            flex-shrink: 0;
        }

        .tl-scale-track {
            flex: 1;
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: var(--t4);
            font-variant-numeric: tabular-nums;
        }

        /* ─── Task Cards ─── */
        .tasks {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border-s);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
        }

        .task {
            background: var(--card);
            overflow: hidden;
            transition: background 0.15s;
        }

        .task:hover {
            background: var(--card-h);
        }

        .task-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            cursor: pointer;
            user-select: none;
            gap: 8px;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .task-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .task-dot--pending {
            background: var(--stone);
        }

        .task-dot--queued {
            background: var(--amber);
            opacity: 0.5;
        }

        .task-dot--running {
            background: var(--amber);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .task-dot--success {
            background: var(--green);
        }

        .task-dot--failed {
            background: var(--red);
        }

        .task-dot--skipped {
            background: var(--stone);
            opacity: 0.4;
        }

        .task-id {
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .task-name {
            font-size: 12px;
            color: var(--t2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            font-size: 11px;
            color: var(--t3);
            font-variant-numeric: tabular-nums;
        }

        .task-tokens {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-tokens-bar {
            width: 40px;
            height: 4px;
            background: var(--bg2);
            border-radius: 2px;
            overflow: hidden;
        }

        .task-tokens-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s;
        }

        .task-tokens-fill--cached {
            background: var(--blue);
            opacity: 0.5;
        }

        .task-expand {
            font-size: 10px;
            color: var(--t4);
            transition: transform 0.2s;
        }

        .task--open .task-expand {
            transform: rotate(180deg);
        }

        /* Task body (collapsed by default) */
        .task-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .task--open .task-body {
            max-height: 600px;
        }

        .task-body-inner {
            padding: 0 16px 14px;
        }

        .events {
            max-height: 220px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg3) transparent;
            border: 1px solid var(--border-s);
            border-radius: var(--r-sm);
            background: var(--bg1);
            padding: 8px;
        }

        .events::-webkit-scrollbar {
            width: 3px;
        }

        .events::-webkit-scrollbar-thumb {
            background: var(--bg3);
            border-radius: 2px;
        }

        .ev {
            display: flex;
            gap: 6px;
            padding: 2px 0;
            font-size: 11px;
            color: var(--t2);
            line-height: 1.6;
        }

        .ev-icon {
            flex-shrink: 0;
            width: 16px;
            text-align: center;
            font-size: 10px;
        }

        .ev-text {
            word-break: break-all;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
        }

        .task-usage {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .usage-item {
            background: var(--bg1);
            border-radius: var(--r-sm);
            padding: 8px 10px;
        }

        .usage-label {
            font-size: 9px;
            font-weight: 500;
            color: var(--t4);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .usage-val {
            font-size: 14px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            margin-top: 2px;
        }

        .task-err {
            margin-top: 8px;
            padding: 8px 10px;
            background: var(--red-bg);
            border: 1px solid var(--red-bd);
            border-radius: var(--r-sm);
            font-size: 11px;
            color: var(--red);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── Cost Panel ─── */
        .cost-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border-s);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
        }

        .cost-item {
            background: var(--card);
            padding: 14px 16px;
        }

        .cost-bar-track {
            height: 6px;
            background: var(--bg2);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .cost-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        /* ─── Footer ─── */
        .footer {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 10px;
            color: var(--t4);
        }

        .footer-stats {
            display: flex;
            gap: 16px;
        }

        .footer-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .footer-stat i {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        /* ─── Loading ─── */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            color: var(--t3);
            font-size: 12px;
            gap: 16px;
        }

        .loading-bar {
            width: 48px;
            height: 2px;
            background: var(--bg2);
            border-radius: 1px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 100%;
            background: var(--t3);
            border-radius: 1px;
            animation: load-slide 1.2s ease-in-out infinite;
        }

        @keyframes load-slide {
            0% {
                left: -24px
            }

            100% {
                left: 48px
            }
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(6px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .fade-up {
            animation: fade-up 0.3s ease;
        }

        /* ─── Responsive ─── */
        @media (max-width: 640px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .cost-grid {
                grid-template-columns: 1fr;
            }

            .task-usage {
                grid-template-columns: 1fr;
            }

            .hdr {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="shell" id="app">
        <div class="loading" id="loading">
            <div class="loading-bar"></div>
            <span>正在连接编排器…</span>
        </div>
    </div>

    <script>
        let S = null;
        const PHASE_LABEL = { initializing: '初始化', running: '运行中', completed: '已完成', failed: '已失败' };
        const STATUS_LABEL = { pending: '等待', queued: '排队', running: '执行中', success: '完成', failed: '失败', skipped: '跳过' };


        // ─── SSE Connection ───
        function connect() {
            const es = new EventSource('/api/events');
            es.onmessage = e => {
                const d = JSON.parse(e.data);
                if (d.type === 'snapshot') { S = d.state; renderAll(); }
                else if (d.type === 'phase') { S.phase = d.phase; if (d.endTime) S.endTime = d.endTime; renderHeader(); renderProgress(); renderTimeline(); }
                else if (d.type === 'task_update') { Object.assign(S.tasks[d.taskId], d.updates); renderHeader(); renderProgress(); renderTimeline(); renderTaskCard(d.taskId); renderCost(); }
                else if (d.type === 'task_event') { S.tasks[d.taskId].events.push(d.event); appendEvent(d.taskId, d.event); }
            };
            es.onerror = () => { es.close(); setTimeout(connect, 2000); };
        }

        // ─── Utilities ───
        function esc(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }

        function fmtElapsed(startMs, endMs) {
            const ms = (endMs || Date.now()) - startMs;
            if (ms < 0) return '—';
            const s = Math.floor(ms / 1000);
            if (s < 60) return s + 's';
            const m = Math.floor(s / 60);
            const r = s % 60;
            if (m < 60) return r > 0 ? `${m}m${r}s` : `${m}m`;
            const h = Math.floor(m / 60);
            return `${h}h${m % 60}m`;
        }

        function fmtTokens(n) {
            if (!n && n !== 0) return '—';
            if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
            return String(n);
        }

        function calcTokens(tasks) {
            let totalInput = 0, totalCached = 0, totalOutput = 0;
            for (const t of tasks) {
                if (!t.usage) continue;
                totalInput += t.usage.input - (t.usage.cached || 0);
                totalCached += t.usage.cached || 0;
                totalOutput += t.usage.output;
            }
            const total = totalInput + totalCached + totalOutput;
            const cacheRate = (totalInput + totalCached) > 0 ? totalCached / (totalInput + totalCached) : 0;
            return { totalInput, totalCached, totalOutput, total, cacheRate };
        }

        // ─── Full Render ───
        function renderAll() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div id="hdr"></div>
                <div id="prog-wrap"></div>
                <div id="stats-wrap"></div>
                <section class="sec"><div class="sec-hdr"><span class="sec-title">时间轴</span><span id="tl-elapsed" style="font-size:10px;color:var(--t3)"></span></div><div id="timeline"></div></section>
                <section class="sec"><div class="sec-hdr"><span class="sec-title">任务详情</span><span id="task-count" style="font-size:10px;color:var(--t3)"></span></div><div id="task-list"></div></section>
                <section class="sec" id="cost-sec"><div class="sec-hdr"><span class="sec-title">Token 用量</span></div><div id="cost-panel"></div></section>
                <div id="footer-wrap"></div>
            `;
            renderHeader();
            renderProgress();
            renderStats();
            renderTimeline();
            renderAllTasks();
            renderCost();
            renderFooter();
        }

        // ─── Header ───
        function renderHeader() {
            if (!S) return;
            const el = document.getElementById('hdr');
            if (!el) return;
            el.innerHTML = `
                <div class="hdr">
                    <div class="hdr-left">
                        <span class="hdr-title">编排器</span>
                        <span class="badge badge--${S.phase}"><i></i>${PHASE_LABEL[S.phase] || S.phase}</span>
                    </div>
                    <div class="hdr-right">
                        <span>${S.runId}</span>
                        <span>${S.config.approvalMode}</span>
                        ${S.config.parallel ? `<span>并行 ×${S.config.concurrency}</span>` : '<span>顺序</span>'}
                        <span>${fmtElapsed(S.startTime, S.endTime)}</span>
                    </div>
                </div>
            `;
        }

        // ─── Progress Bar ───
        function renderProgress() {
            if (!S) return;
            const el = document.getElementById('prog-wrap');
            if (!el) return;
            const ts = Object.values(S.tasks);
            const done = ts.filter(t => ['success', 'failed', 'skipped'].includes(t.status)).length;
            const pct = ts.length ? Math.round(done / ts.length * 100) : 0;
            el.innerHTML = `<div class="prog"><div class="prog-fill prog-fill--${S.phase}" style="width:${pct}%"></div></div>`;
        }

        // ─── Stats Cards ───
        function renderStats() {
            if (!S) return;
            const el = document.getElementById('stats-wrap');
            if (!el) return;
            const ts = Object.values(S.tasks);
            const done = ts.filter(t => ['success', 'failed', 'skipped'].includes(t.status)).length;
            const succ = ts.filter(t => t.status === 'success').length;
            const fail = ts.filter(t => t.status === 'failed').length;
            const { total, cacheRate } = calcTokens(ts);

            el.innerHTML = `
                <div class="stats fade-up">
                    <div class="stat">
                        <div class="stat-label">进度</div>
                        <div class="stat-val">${done}/${ts.length}</div>
                        <div class="stat-sub">${ts.length ? Math.round(done / ts.length * 100) : 0}% 完成</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">结果</div>
                        <div class="stat-val" style="color:${fail > 0 ? 'var(--red)' : 'var(--green)'}">${succ} 通过 ${fail} 失败</div>
                        <div class="stat-sub">${ts.filter(t => t.status === 'running').length} 执行中</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">缓存命中</div>
                        <div class="stat-val">${(cacheRate * 100).toFixed(0)}%</div>
                        <div class="stat-sub">输入缓存率</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">总 Token</div>
                        <div class="stat-val">${fmtTokens(total)}</div>
                        <div class="stat-sub">输入 + 缓存 + 输出</div>
                    </div>
                </div>
            `;
        }

        // ─── Timeline (Gantt) ───
        function renderTimeline() {
            if (!S) return;
            const el = document.getElementById('timeline');
            if (!el) return;

            const ts = Object.values(S.tasks).sort((a, b) => a.id - b.id);
            const globalStart = S.startTime;
            const globalEnd = S.endTime || Date.now();
            const totalDur = Math.max(globalEnd - globalStart, 1000);

            let html = '<div class="timeline">';
            for (const t of ts) {
                const tStart = t.startTime || globalEnd;
                const tEnd = t.endTime || (t.status === 'running' ? Date.now() : tStart);
                const left = Math.max(0, ((tStart - globalStart) / totalDur) * 100);
                const width = Math.max(1, ((tEnd - tStart) / totalDur) * 100);
                const dur = t.startTime ? fmtElapsed(t.startTime, t.endTime) : '—';
                const name = t.file.replace(/^T\d+-?/, '').replace(/\.md$/, '');

                html += `
                    <div class="tl-row">
                        <span class="tl-label">T${t.id}</span>
                        <div class="tl-track">
                            <div class="tl-bar tl-bar--${t.status}" style="left:${left}%;width:${width}%">${name.slice(0, 18)}</div>
                        </div>
                        <span class="tl-time">${dur}</span>
                    </div>
                `;
            }

            // Scale
            const steps = 5;
            html += '<div class="tl-scale"><span class="tl-scale-spacer"></span><div class="tl-scale-track">';
            for (let i = 0; i <= steps; i++) {
                const t = (totalDur / steps) * i;
                html += `<span>${fmtElapsed(0, t)}</span>`;
            }
            html += '</div><span class="tl-time"></span></div>';
            html += '</div>';
            el.innerHTML = html;
        }

        // ─── Task Cards ───
        function renderAllTasks() {
            const el = document.getElementById('task-list');
            if (!el) return;
            const ts = Object.values(S.tasks).sort((a, b) => a.id - b.id);
            el.innerHTML = `<div class="tasks">${ts.map(t => taskCardHTML(t)).join('')}</div>`;
            document.getElementById('task-count').textContent = `${ts.length} 个任务`;

            // Bind click handlers
            el.querySelectorAll('.task-hdr').forEach(h => {
                h.addEventListener('click', () => {
                    const card = h.closest('.task');
                    card.classList.toggle('task--open');
                });
            });
        }

        function renderTaskCard(id) {
            const card = document.querySelector(`[data-task="${id}"]`);
            if (!card) return;
            const wasOpen = card.classList.contains('task--open');
            const newCard = document.createElement('div');
            newCard.innerHTML = taskCardHTML(S.tasks[id]);
            const replacement = newCard.firstElementChild;
            if (wasOpen) replacement.classList.add('task--open');
            card.replaceWith(replacement);
            replacement.querySelector('.task-hdr').addEventListener('click', () => {
                replacement.classList.toggle('task--open');
            });
        }

        function taskCardHTML(t) {
            const dur = t.startTime && t.endTime ? fmtElapsed(t.startTime, t.endTime) : t.startTime ? fmtElapsed(t.startTime, null) : '—';
            const name = t.file.replace(/^T\d+-?/, '').replace(/\.md$/, '') || t.file;
            const tokTotal = t.usage ? t.usage.input + t.usage.output : 0;
            const maxTok = Math.max(...Object.values(S.tasks).map(x => x.usage ? x.usage.input + x.usage.output : 0), 1);
            const tokPct = tokTotal > 0 ? Math.round((tokTotal / maxTok) * 100) : 0;
            const cachedPct = t.usage && t.usage.input > 0 ? Math.round((t.usage.cached / t.usage.input) * 100) : 0;

            return `
                <div class="task" data-task="${t.id}">
                    <div class="task-hdr">
                        <div class="task-left">
                            <span class="task-dot task-dot--${t.status}"></span>
                            <span class="task-id">T${t.id}</span>
                            <span class="task-name">${esc(name)}</span>
                        </div>
                        <div class="task-right">
                            <span>${dur}</span>
                            ${tokTotal > 0 ? `
                                <div class="task-tokens">
                                    <span>${fmtTokens(tokTotal)}</span>
                                    <div class="task-tokens-bar">
                                        <div class="task-tokens-fill task-tokens-fill--cached" style="width:${tokPct}%"></div>
                                    </div>
                                </div>
                            ` : ''}
                            <span class="task-expand">▼</span>
                        </div>
                    </div>
                    <div class="task-body">
                        <div class="task-body-inner">
                            ${t.events.length ? `
                                <div class="events" data-events="${t.id}">
                                    ${t.events.map(eventHTML).join('')}
                                </div>
                            ` : t.status === 'running' ? `
                                <div class="events" data-events="${t.id}">
                                    <div class="ev"><span class="ev-icon" style="color:var(--t4)">·</span><span class="ev-text" style="color:var(--t4)">等待响应…</span></div>
                                </div>
                            ` : ''}
                            ${t.usage ? `
                                <div class="task-usage">
                                    <div class="usage-item">
                                        <div class="usage-label">输入</div>
                                        <div class="usage-val">${fmtTokens(t.usage.input)}</div>
                                    </div>
                                    <div class="usage-item">
                                        <div class="usage-label">缓存</div>
                                        <div class="usage-val" style="color:var(--blue)">${fmtTokens(t.usage.cached)} <span style="font-size:10px;color:var(--t3)">${cachedPct}%</span></div>
                                    </div>
                                    <div class="usage-item">
                                        <div class="usage-label">输出</div>
                                        <div class="usage-val">${fmtTokens(t.usage.output)}</div>
                                    </div>
                                </div>
                            ` : ''}
                            ${t.error ? `<div class="task-err">${esc(t.error)}</div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function eventHTML(e) {
            return `<div class="ev"><span class="ev-icon">${e.icon || '·'}</span><span class="ev-text">${esc(e.text)}</span></div>`;
        }

        function appendEvent(id, ev) {
            const el = document.querySelector(`[data-events="${id}"]`);
            if (el) {
                el.innerHTML += eventHTML(ev);
                el.scrollTop = el.scrollHeight;
            }
        }

        // ─── Token Panel ───
        function renderCost() {
            if (!S) return;
            const el = document.getElementById('cost-panel');
            if (!el) return;

            const ts = Object.values(S.tasks);
            const { totalInput, totalCached, totalOutput, total, cacheRate } = calcTokens(ts);
            const inputPct = total > 0 ? (totalInput / total) * 100 : 0;
            const cachedPct = total > 0 ? (totalCached / total) * 100 : 0;
            const outputPct = total > 0 ? (totalOutput / total) * 100 : 0;

            el.innerHTML = `
                <div class="cost-grid">
                    <div class="cost-item">
                        <div class="stat-label">Fresh 输入</div>
                        <div class="stat-val" style="font-size:16px">${fmtTokens(totalInput)}</div>
                        <div class="cost-bar-track">
                            <div class="cost-bar-fill" style="width:${inputPct}%;background:var(--amber)"></div>
                        </div>
                        <div class="stat-sub">${totalInput.toLocaleString()} tokens</div>
                    </div>
                    <div class="cost-item">
                        <div class="stat-label">缓存输入</div>
                        <div class="stat-val" style="font-size:16px;color:var(--blue)">${fmtTokens(totalCached)}</div>
                        <div class="cost-bar-track">
                            <div class="cost-bar-fill" style="width:${cachedPct}%;background:var(--blue)"></div>
                        </div>
                        <div class="stat-sub">${(cacheRate * 100).toFixed(0)}% 命中率</div>
                    </div>
                    <div class="cost-item">
                        <div class="stat-label">输出</div>
                        <div class="stat-val" style="font-size:16px">${fmtTokens(totalOutput)}</div>
                        <div class="cost-bar-track">
                            <div class="cost-bar-fill" style="width:${outputPct}%;background:var(--green)"></div>
                        </div>
                        <div class="stat-sub">${totalOutput.toLocaleString()} tokens</div>
                    </div>
                    <div class="cost-item">
                        <div class="stat-label">总 Token</div>
                        <div class="stat-val" style="font-size:16px">${fmtTokens(total)}</div>
                        <div class="cost-bar-track">
                            <div class="cost-bar-fill" style="width:100%;background:linear-gradient(90deg,var(--amber),var(--blue),var(--green))"></div>
                        </div>
                        <div class="stat-sub">${total.toLocaleString()} tokens</div>
                    </div>
                </div>
            `;
        }

        // ─── Footer ───
        function renderFooter() {
            if (!S) return;
            const el = document.getElementById('footer-wrap');
            if (!el) return;
            const ts = Object.values(S.tasks);
            const succ = ts.filter(t => t.status === 'success').length;
            const fail = ts.filter(t => t.status === 'failed').length;
            const skip = ts.filter(t => t.status === 'skipped').length;

            el.innerHTML = `
                <div class="footer">
                    <div class="footer-stats">
                        <span class="footer-stat"><i style="background:var(--green)"></i>${succ} 通过</span>
                        <span class="footer-stat"><i style="background:var(--red)"></i>${fail} 失败</span>
                        ${skip ? `<span class="footer-stat"><i style="background:var(--stone)"></i>${skip} 跳过</span>` : ''}
                    </div>
                    <span>${new Date(S.startTime).toLocaleString('zh-CN')}</span>
                </div>
            `;
        }

        // ─── Auto-refresh running timer ───
        setInterval(() => {
            if (S && S.phase === 'running') {
                renderHeader();
                renderTimeline();
                renderStats();
            }
        }, 3000);

        // ─── Init ───
        connect();
    </script>
</body>

</html>
